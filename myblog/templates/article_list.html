{% extends "base.html" %}

{% block title %}文章列表 - 我的技术博客{% endblock %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom:20px; border-left:4px solid #3498db; padding-left:10px;">文章列表</h2>

    {% for article in articles %}
    <div style="border-bottom:1px solid #eee; padding:20px 0;">
        <h3 style="margin-bottom:8px;">
            <a href="{% url 'detail' article.id %}" style="color:#2c3e50; text-decoration:none;">{{ article.title }}</a>
        </h3>
        <p style="color:#7f8c8d; font-size:14px;">
            {{ article.created_time|date:"Y-m-d" }} · lrj
        </p>
        <p style="margin:10px 0; color:#555;">
            {{ article.content|truncatechars:60 }}...
        </p>
        <a href="{% url 'detail' article.id %}" style="color:#3498db;">阅读全文</a>
    </div>
    {% empty %}
    <p style="text-align:center; padding:30px;">暂无文章</p>
    {% endfor %}
</div>
{% endblock %}
